<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>告白信</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=LXGW+WenKai:wght@300;400;500&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
  <style>
    :root {
      --pink-50: #fef2f8;
      --pink-100: #fce7f3;
      --pink-200: #fbcfe8;
      --pink-300: #f9a8d4;
      --pink-400: #f472b6;
      --pink-500: #ec4899;
      --pink-600: #db2777;
      --peach: #fcd5ce;
      --cream: #fff8f0;
      --lavender: #f3e8ff;
      --ink: #4a3640;
      --ink-light: #8b7080;
      --space-sm: 0.5rem;
      --space-md: 1rem;
      --space-lg: 1.5rem;
      --space-xl: 2rem;
      --space-2xl: 3rem;
      --space-3xl: 4rem;
      --font-zh: 'LXGW WenKai', serif;
      --font-cute: 'ZCOOL KuaiLe', cursive;
      --radius-lg: 20px;
      --radius-xl: 28px;
      --radius-2xl: 36px;
      --shadow-soft: 0 8px 32px rgba(236, 72, 153, 0.12);
      --shadow-glow: 0 0 60px rgba(244, 114, 182, 0.25);
      --duration: 300ms;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }
    body {
      font-family: var(--font-zh);
      background: linear-gradient(135deg, var(--pink-50) 0%, var(--peach) 50%, var(--lavender) 100%);
      min-height: 100vh;
      color: var(--ink);
      line-height: 1.7;
      overflow-x: hidden;
    }
    .floating-elements {
      position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden;
    }
    .heart {
      position: absolute; font-size: 24px; opacity: 0;
      animation: float-heart 10s ease-in-out infinite;
    }
    @keyframes float-heart {
      0% { transform: translateY(100vh) scale(0.5) rotate(0deg); opacity: 0; }
      10% { opacity: 0.8; }
      90% { opacity: 0.8; }
      100% { transform: translateY(-20vh) scale(1.2) rotate(30deg); opacity: 0; }
    }
    .sparkle {
      position: absolute; width: 4px; height: 4px;
      background: var(--pink-300);
      border-radius: 50%;
      animation: sparkle 2s ease-in-out infinite;
    }
    @keyframes sparkle {
      0%, 100% { opacity: 0; transform: scale(0); }
      50% { opacity: 1; transform: scale(1); }
    }
    .container {
      max-width: 800px; margin: 0 auto; padding: var(--space-2xl) var(--space-lg);
      position: relative; z-index: 1;
    }
    .header {
      text-align: center; margin-bottom: var(--space-2xl);
    }
    .header-icon {
      font-size: 3rem;
      margin-bottom: var(--space-md);
      animation: bounce 2s ease-in-out infinite;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    .header-title {
      font-family: var(--font-cute);
      font-size: clamp(1.5rem, 5vw, 2.5rem);
      background: linear-gradient(135deg, var(--pink-500), var(--pink-600));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .actions {
      display: flex; flex-wrap: wrap; gap: var(--space-md);
      justify-content: center; margin-bottom: var(--space-lg);
    }
    .actions-toggle {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 100;
    }
    .actions-toggle .toggle-btn {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      background: linear-gradient(135deg, var(--pink-400), var(--pink-500));
      color: white;
      box-shadow: 0 4px 20px rgba(236, 72, 153, 0.4);
      cursor: pointer;
      border: none;
      transition: all var(--duration);
    }
    .actions-toggle .toggle-btn:hover {
      transform: scale(1.1);
    }
    .actions-panel {
      position: fixed;
      bottom: 80px;
      right: 20px;
      z-index: 99;
      background: linear-gradient(145deg, rgba(255,255,255,0.98), rgba(255,248,240,0.98));
      border-radius: var(--radius-lg);
      padding: var(--space-md);
      box-shadow: var(--shadow-soft);
      border: 2px solid rgba(244, 114, 182, 0.2);
      display: flex;
      flex-direction: column;
      gap: var(--space-sm);
      transform: translateY(20px);
      opacity: 0;
      pointer-events: none;
      transition: all var(--duration);
    }
    .actions-panel.visible {
      transform: translateY(0);
      opacity: 1;
      pointer-events: auto;
    }
    .actions-panel .btn {
      font-size: 0.9rem;
      padding: var(--space-sm) var(--space-md);
    }
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      gap: var(--space-sm); padding: var(--space-md) var(--space-xl);
      border-radius: var(--radius-xl);
      font-family: var(--font-zh); font-size: 0.95rem; font-weight: 500;
      cursor: pointer; transition: all var(--duration); border: none;
      text-decoration: none;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--pink-400), var(--pink-500));
      color: white;
      box-shadow: 0 4px 20px rgba(236, 72, 153, 0.4);
    }
    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 30px rgba(236, 72, 153, 0.5);
    }
    .btn-secondary {
      background: white; color: var(--pink-500);
      border: 2px solid var(--pink-200);
    }
    .btn-secondary:hover {
      background: var(--pink-50); border-color: var(--pink-300);
      transform: translateY(-2px);
    }
    .letter-wrapper {
      max-width: 600px; margin: 0 auto;
    }
    .letter-wrapper.export-mode {
      padding: 40px;
      background: linear-gradient(135deg, var(--pink-50) 0%, var(--peach) 50%, var(--lavender) 100%);
      border-radius: var(--radius-2xl);
    }
    .letter-card {
      background: linear-gradient(145deg, rgba(255,255,255,0.98), rgba(255,248,240,0.98));
      border-radius: var(--radius-2xl);
      padding: var(--space-3xl) var(--space-2xl);
      box-shadow: var(--shadow-glow), var(--shadow-soft);
      border: 3px solid rgba(244, 114, 182, 0.25);
      position: relative;
      overflow: hidden;
    }
    .letter-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 6px;
      background: linear-gradient(90deg, var(--pink-300), var(--pink-400), var(--pink-500), var(--pink-400), var(--pink-300));
    }
    .letter-card::after {
      content: '💕';
      position: absolute; bottom: 20px; right: 25px;
      font-size: 2rem; opacity: 0.15;
    }
    .decorative-corner {
      position: absolute; font-size: 1.5rem; opacity: 0.2;
    }
    .decorative-corner.top-left { top: 15px; left: 20px; }
    .decorative-corner.top-right { top: 15px; right: 20px; }
    .letter-content { position: relative; z-index: 1; }
    .letter-title {
      font-family: var(--font-cute);
      font-size: clamp(2rem, 5vw, 2.8rem);
      background: linear-gradient(135deg, var(--pink-500), var(--pink-600));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-align: center;
      margin-bottom: var(--space-md);
    }
    .letter-subtitle {
      text-align: center;
      font-size: 1.2rem;
      color: var(--pink-500);
      margin-bottom: var(--space-2xl);
      padding-bottom: var(--space-lg);
      border-bottom: 2px dashed var(--pink-100);
      position: relative;
    }
    .letter-subtitle::after {
      content: '💗';
      position: absolute; bottom: -12px; left: 50%;
      transform: translateX(-50%);
      font-size: 1.5rem;
      background: white;
      padding: 0 10px;
    }
    .letter-body {
      font-size: 1.1rem;
      line-height: 2.4;
      color: var(--ink);
      text-align: justify;
      margin-bottom: var(--space-2xl);
    }
    .letter-body p {
      margin-bottom: var(--space-lg);
      text-indent: 2em;
    }
    .letter-body p:first-child { text-indent: 0; }
    .letter-footer {
      text-align: center;
      padding-top: var(--space-xl);
      border-top: 2px dashed var(--pink-100);
      position: relative;
    }
    .letter-footer::before {
      content: '💝';
      position: absolute; top: -12px; left: 50%;
      transform: translateX(-50%);
      font-size: 1.5rem;
      background: white;
      padding: 0 10px;
    }
    .signature {
      font-family: var(--font-cute);
      font-size: 1.8rem;
      background: linear-gradient(135deg, var(--pink-500), var(--pink-400));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: var(--space-sm);
    }
    .signature-name {
      font-size: 1.1rem;
      color: var(--pink-500);
    }
    .empty-state {
      text-align: center; padding: var(--space-3xl);
    }
    .empty-state-icon {
      font-size: 4rem; margin-bottom: var(--space-lg);
    }
    .empty-state p {
      color: var(--ink-light);
      margin-bottom: var(--space-lg);
      font-size: 1.1rem;
    }
    .password-lock {
      max-width: 400px; margin: 0 auto;
      text-align: center;
    }
    .lock-icon {
      font-size: 4rem; margin-bottom: var(--space-lg);
      animation: bounce 2s ease-in-out infinite;
    }
    .password-form {
      background: linear-gradient(145deg, rgba(255,255,255,0.95), rgba(255,248,240,0.95));
      border-radius: var(--radius-2xl);
      padding: var(--space-2xl);
      box-shadow: var(--shadow-soft), var(--shadow-glow);
      border: 2px solid rgba(244, 114, 182, 0.2);
    }
    .password-title {
      font-family: var(--font-cute);
      font-size: 1.5rem;
      color: var(--pink-600);
      margin-bottom: var(--space-md);
    }
    .password-hint {
      color: var(--ink-light);
      margin-bottom: var(--space-lg);
      font-size: 0.95rem;
    }
    .password-input {
      width: 100%;
      padding: var(--space-md);
      border: 2px solid var(--pink-100);
      border-radius: var(--radius-lg);
      font-family: var(--font-zh);
      font-size: 1rem;
      text-align: center;
      margin-bottom: var(--space-md);
      transition: all var(--duration);
    }
    .password-input:focus {
      outline: none;
      border-color: var(--pink-300);
      box-shadow: 0 0 0 4px rgba(244, 114, 182, 0.15);
    }
    .password-error {
      color: var(--pink-600);
      font-size: 0.9rem;
      margin-top: var(--space-md);
      min-height: 1.4em;
    }
    .hidden { display: none !important; }
    @media (max-width: 768px) {
      .container { padding: var(--space-lg) var(--space-md); }
      .letter-card { padding: var(--space-xl) var(--space-lg); }
      .btn { width: 100%; justify-content: center; }
    }
    @media print {
      .floating-elements, .header, .actions { display: none !important; }
      body { background: white; }
      .letter-card { box-shadow: none; border: 2px solid var(--pink-200); }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <div class="floating-elements" id="floatingElements"></div>
  <div class="container">
    <header class="header">
      <div class="header-icon">💌</div>
      <h1 class="header-title">一封告白信</h1>
    </header>
    <div id="content">
      <div class="empty-state">
        <div class="empty-state-icon">💝</div>
        <p>还没有告白信哦</p>
        <a href="editor.html" class="btn btn-primary">✨ 开始写一封</a>
      </div>
      <div class="password-lock hidden" id="passwordLock">
        <div class="password-form">
          <div class="lock-icon">🔐</div>
          <h2 class="password-title">这是一封加密的告白信</h2>
          <p class="password-hint">请输入密码查看内容</p>
          <input type="password" class="password-input" id="passwordInput" placeholder="输入密码" onkeypress="if(event.key==='Enter')verifyPassword()">
          <p class="password-error" id="passwordError"></p>
          <button class="btn btn-primary" onclick="verifyPassword()" style="width:100%">🔓 解锁查看</button>
        </div>
      </div>
    </div>
  </div>
  <div class="actions-toggle" id="actionsToggle">
    <div class="actions-panel" id="actionsPanel">
      <a href="editor.html" class="btn btn-secondary">✏️ 写新的</a>
      <button class="btn btn-primary" onclick="exportImage()">📷 存为图片</button>
      <button class="btn btn-secondary" onclick="exportTxt()">📄 保存文本</button>
    </div>
    <button class="toggle-btn" onclick="toggleActions()">💗</button>
  </div>
  <script>
    const $ = id => document.getElementById(id);
    let letterData = null;
    let letterId = null;
    let actionsVisible = false;
    
    function toggleActions() {
      actionsVisible = !actionsVisible;
      $('actionsPanel').classList.toggle('visible', actionsVisible);
    }
    
    function getQueryParam(name) {
      const params = new URLSearchParams(window.location.search);
      return params.get(name);
    }
    
    async function loadLetter() {
      letterId = getQueryParam('id');
      if (!letterId) return;
      
      try {
        const res = await fetch('/api/letter/' + letterId);
        const result = await res.json();
        
        if (!result.success) {
          $('content').innerHTML = `
            <div class="empty-state">
              <div class="empty-state-icon">💔</div>
              <p>${result.error || '告白信不存在'}</p>
              <a href="editor.html" class="btn btn-primary">✨ 写一封新的</a>
            </div>
          `;
          return;
        }
        
        letterData = result.letter;
        
        if (letterData.hasPassword) {
          $('passwordLock').classList.remove('hidden');
          $('passwordInput').focus();
          document.querySelector('.empty-state').classList.add('hidden');
        } else {
          document.querySelector('.empty-state').classList.add('hidden');
          renderLetter(letterData);
        }
      } catch (e) {
        console.error('Failed to load letter:', e);
        $('content').innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">💔</div>
            <p>加载失败，请稍后重试</p>
          </div>
        `;
      }
    }
    
    async function verifyPassword() {
      const input = $('passwordInput').value;
      $('passwordError').textContent = '';
      
      try {
        const res = await fetch('/api/letter/' + letterId + '/verify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: input })
        });
        const result = await res.json();
        
        if (result.success) {
          letterData = result.letter;
          $('passwordLock').classList.add('hidden');
          $('passwordInput').value = '';
          renderLetter(letterData);
        } else {
          $('passwordError').textContent = result.error || '密码错误 💔';
          $('passwordInput').value = '';
          $('passwordInput').focus();
        }
      } catch (e) {
        $('passwordError').textContent = '网络错误，请重试';
      }
    }
    
    function renderLetter(letter) {
      $('content').innerHTML = `
        <div class="letter-wrapper">
          <article class="letter-card">
            <span class="decorative-corner top-left">💗</span>
            <span class="decorative-corner top-right">💕</span>
            <div class="letter-content">
              <h1 class="letter-title">${escapeHtml(letter.title)}</h1>
              <p class="letter-subtitle">${escapeHtml(letter.subtitle)}</p>
              <div class="letter-body">${renderBody(letter.content)}</div>
              <footer class="letter-footer">
                <p class="signature">${escapeHtml(letter.signature)}</p>
                <p class="signature-name">${escapeHtml(letter.signatureName)}</p>
              </footer>
            </div>
          </article>
        </div>
      `;
      document.title = `致 ${letter.title} · 告白信`;
    }
    
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text || '';
      return div.innerHTML;
    }
    
    function renderBody(content) {
      const paragraphs = content.split(/\n\s*\n/).filter(p => p.trim());
      return paragraphs.map(p => `<p>${escapeHtml(p.trim()).replace(/\n/g, '<br>')}</p>`).join('');
    }
    
    function exportTxt() {
      if (!letterData) return;
      const text = `${letterData.title}\n\n${letterData.subtitle}\n\n${letterData.content}\n\n${letterData.signature}\n${letterData.signatureName}`;
      const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `告白信_${letterData.title}.txt`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }
    
    async function exportImage() {
      if (!letterData) return;
      const letterWrapper = document.querySelector('.letter-wrapper');
      if (!letterWrapper) return;
      letterWrapper.classList.add('export-mode');
      try {
        await document.fonts.ready;
        const canvas = await html2canvas(letterWrapper, {
          scale: 2,
          useCORS: true,
          backgroundColor: null,
          logging: false
        });
        const link = document.createElement('a');
        link.download = `告白信_${Date.now()}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
      } catch (e) {
        console.error('Export image failed:', e);
        alert('导出图片失败，请稍后重试');
      } finally {
        letterWrapper.classList.remove('export-mode');
      }
    }
    
    function createFloatingElements() {
      const container = $('floatingElements');
      const hearts = ['💗', '💕', '💖', '💝', '💓', '🩷'];
      for (let i = 0; i < 10; i++) {
        const heart = document.createElement('div');
        heart.className = 'heart';
        heart.textContent = hearts[Math.floor(Math.random() * hearts.length)];
        heart.style.left = Math.random() * 100 + '%';
        heart.style.animationDelay = Math.random() * 5 + 's';
        heart.style.animationDuration = (8 + Math.random() * 6) + 's';
        container.appendChild(heart);
      }
      for (let i = 0; i < 20; i++) {
        const sparkle = document.createElement('div');
        sparkle.className = 'sparkle';
        sparkle.style.left = Math.random() * 100 + '%';
        sparkle.style.top = Math.random() * 100 + '%';
        sparkle.style.animationDelay = Math.random() * 2 + 's';
        container.appendChild(sparkle);
      }
    }
    
    loadLetter();
    createFloatingElements();
  </script>
</body>
</html>
