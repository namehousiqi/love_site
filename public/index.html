<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>告白信</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=LXGW+WenKai:wght@300;400;500&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
  <style>
    :root {
      --pink-50: #fef2f8;
      --pink-100: #fce7f3;
      --pink-200: #fbcfe8;
      --pink-300: #f9a8d4;
      --pink-400: #f472b6;
      --pink-500: #ec4899;
      --pink-600: #db2777;
      --peach: #fcd5ce;
      --lavender: #f3e8ff;
      --ink: #4a3640;
      --ink-light: #8b7080;
      --font-zh: 'LXGW WenKai', serif;
      --font-cute: 'ZCOOL KuaiLe', cursive;
      --radius-xl: 28px;
      --radius-2xl: 36px;
      --shadow-soft: 0 8px 32px rgba(236, 72, 153, 0.12);
      --shadow-glow: 0 0 60px rgba(244, 114, 182, 0.25);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-zh);
      background: linear-gradient(135deg, var(--pink-50) 0%, var(--peach) 50%, var(--lavender) 100%);
      min-height: 100vh;
      color: var(--ink);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .card {
      background: linear-gradient(145deg, rgba(255,255,255,0.95), rgba(255,248,240,0.95));
      border-radius: var(--radius-2xl);
      padding: 4rem 3rem;
      box-shadow: var(--shadow-soft), var(--shadow-glow);
      border: 2px solid rgba(244, 114, 182, 0.2);
      text-align: center;
      max-width: 500px;
    }
    .icon { font-size: 5rem; margin-bottom: 1.5rem; }
    h1 {
      font-family: var(--font-cute);
      font-size: 2.5rem;
      background: linear-gradient(135deg, var(--pink-500), var(--pink-600));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 1rem;
    }
    p { color: var(--ink-light); margin-bottom: 2rem; line-height: 1.8; }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 1rem 2.5rem;
      border-radius: var(--radius-xl);
      font-family: var(--font-zh);
      font-size: 1.1rem;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      border: none;
      background: linear-gradient(135deg, var(--pink-400), var(--pink-500));
      color: white;
      box-shadow: 0 4px 20px rgba(236, 72, 153, 0.4);
      transition: all 0.3s;
    }
    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 30px rgba(236, 72, 153, 0.5);
    }
    @media (max-width: 600px) {
      .card { padding: 2.5rem 1.5rem; }
      h1 { font-size: 2rem; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">💌</div>
    <h1>告白信</h1>
    <p>把藏在心底的话<br>温柔地说出来</p>
    <a href="editor.html" class="btn">💝 写一封告白信</a>
  </div>
</body>
</html>
